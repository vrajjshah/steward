name: Steward trust gate

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Steward
        # The annotation plugin surfaces each pytest failure as a check-run
        # annotation, so failures are diagnosable from the public API.
        run: pip install -e ".[dev]" pytest-github-actions-annotate-failures
      - name: Lint
        run: ruff check .
      - name: Test
        run: make test
      - name: Citation and quality gate
        run: make eval

      # Catch packaging breakage on every push rather than at release time.
      - name: Package build check
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
