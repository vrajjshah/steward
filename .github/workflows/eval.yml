name: Steward trust gate

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Steward
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: make test
      - name: Citation and quality gate
        run: make eval
