<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#10141f">
    <title>{% block title %}Steward — agent access intelligence{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Steward home">
          <span class="brand-mark" aria-hidden="true">S</span>
          <span>Steward</span>
        </a>
        <nav aria-label="Primary navigation">
          <a href="/#findings">Findings</a>
          <a href="/#fleet-map">Delegation map</a>
          <a href="/report">Audit report</a>
        </nav>
        <span class="topbar-note">Agent blast-radius intelligence</span>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
      <footer>
        <span>Steward v0.1</span>
        <span>Analyzes permission metadata, never agent payloads.</span>
      </footer>
    </div>
    <script src="{{ url_for('static', path='dashboard.js') }}" defer></script>
  </body>
</html>
